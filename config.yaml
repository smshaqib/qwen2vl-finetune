# ----------------------------------------------------------------------------
# Config for Qwen2-VL QLoRA fine-tuning on Kaggle GPU.
# Edit values here; train.py reads everything from this file.
# ----------------------------------------------------------------------------

model:
  # Swap to "Qwen/Qwen2-VL-7B-Instruct" once 2B works (7B needs QLoRA + tight batch).
  name: "Qwen/Qwen2-VL-2B-Instruct"
  load_in_4bit: true          # QLoRA: 4-bit base weights (required to fit on a T4)
  # Image token budget per sample. Lower = less VRAM, faster. Qwen uses 28x28 patches.
  min_pixels: 200704          # 256*28*28
  max_pixels: 1003520         # 1280*28*28

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  # Attention + MLP projections in the language model. Vision tower stays frozen.
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj",
                   "gate_proj", "up_proj", "down_proj"]

data:
  # Any HF dataset with an image + a question/answer (or caption) per row.
  # Field names are mapped below so you can swap datasets without code changes.
  dataset_name: "merve/vqav2-small"
  split: "validation"         # this small dataset ships a single 'validation' split
  max_samples: 2000           # cap for quick runs; set null to use all
  # ---- field mapping: tell the loader which columns to use ----
  image_field: "image"
  question_field: "question"
  answer_field: "multiple_choice_answer"   # for captioning sets, set to the caption field
  # Fixed instruction prepended to every question (helps a small model stay on task).
  system_prompt: "You are a helpful vision assistant. Answer the question about the image concisely."

train:
  output_dir: "/kaggle/working/qwen2vl-lora"   # persists & is downloadable on Kaggle
  num_epochs: 1
  per_device_batch_size: 1
  grad_accum_steps: 8         # effective batch = 1 * 8 = 8
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_steps: 100             # checkpoint often — Kaggle sessions can drop
  save_total_limit: 2
  max_seq_length: 1024
  bf16: false                 # T4 has no bf16; use fp16. Set true only on A100/L4.
  fp16: true
  gradient_checkpointing: true
  seed: 42
  resume: true               # auto-resume from the latest checkpoint if present
