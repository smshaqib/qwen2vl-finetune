# ----------------------------------------------------------------------------
# Qwen2-VL fine-tune on the MemeDecode dataset (4-class meme classification).
# Dataset mounted on Kaggle at /kaggle/input/meme-data
# ----------------------------------------------------------------------------

model:
  name: "Qwen/Qwen2-VL-2B-Instruct"
  # fp16 LoRA for the 2B model — fits in 16 GB and works on T4.
  # 4-bit (bitsandbytes) only for the 7B AND only on a T4, never P100.
  load_in_4bit: false
  min_pixels: 200704          # 256*28*28
  max_pixels: 1003520         # 1280*28*28

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj",
                   "gate_proj", "up_proj", "down_proj"]

data:
  source: "local_csv"
  images_dir: "/kaggle/input/meme-data/MemeDecode/Train/Image"
  csv_path: "/kaggle/input/meme-data/MemeDecode/Train/Train.csv"
  image_field: "Image_name"
  answer_field: "Target"
  labels: ["Neutral", "Genders", "Religion", "Politics"]
  val_fraction: 0.05          # hold out 5% for the inference sanity-check
  max_samples: null           # use all 2903 train rows
  question: "Classify this meme into exactly one category."
  system_prompt: "You are a meme classifier. Look at the meme image and reply with exactly one of these categories and nothing else: Neutral, Genders, Religion, Politics."

train:
  output_dir: "/kaggle/working/qwen2vl-meme-lora"
  num_epochs: 1
  per_device_batch_size: 1
  grad_accum_steps: 8         # effective batch = 8
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  max_seq_length: 1024
  bf16: false
  fp16: true
  gradient_checkpointing: true
  seed: 42
  resume: true
