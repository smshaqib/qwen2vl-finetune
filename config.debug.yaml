# Fast smoke-test: tiny sample of the meme dataset, frequent saves.
#   python train.py --config config.debug.yaml
# Once this passes, run the full set with: --config config.yaml

model:
  name: "Qwen/Qwen2-VL-2B-Instruct"
  load_in_4bit: false
  min_pixels: 200704
  max_pixels: 1003520

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj",
                   "gate_proj", "up_proj", "down_proj"]

data:
  source: "local_csv"
  images_dir: "/kaggle/input/meme-data/MemeDecode/Train/Image"
  csv_path: "/kaggle/input/meme-data/MemeDecode/Train/Train.csv"
  image_field: "Image_name"
  answer_field: "Target"
  labels: ["Neutral", "Genders", "Religion", "Politics"]
  val_fraction: 0.0
  max_samples: 16             # tiny — just prove the pipeline runs
  question: "Classify this meme into exactly one category."
  system_prompt: "You are a meme classifier. Look at the meme image and reply with exactly one of these categories and nothing else: Neutral, Genders, Religion, Politics."

train:
  output_dir: "/kaggle/working/qwen2vl-meme-lora-debug"
  num_epochs: 1
  per_device_batch_size: 1
  grad_accum_steps: 1
  learning_rate: 1.0e-4
  warmup_ratio: 0.0
  weight_decay: 0.0
  logging_steps: 1
  save_steps: 8
  save_total_limit: 1
  max_seq_length: 1024
  bf16: false
  fp16: true
  gradient_checkpointing: true
  seed: 42
  resume: true
